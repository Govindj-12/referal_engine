version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: referral_db
    environment:
      POSTGRES_USER: referral
      POSTGRES_PASSWORD: referral_secret
      POSTGRES_DB: referral_engine
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referral -d referral_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: referral_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: referral_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://referral:referral_secret@db:5432/referral_engine
      SYNC_DATABASE_URL: postgresql://referral:referral_secret@db:5432/referral_engine
      REDIS_URL: redis://redis:6379/0
      REWARD_DEPTH: "3"
      REWARD_PERCENT: "10"
      VELOCITY_LIMIT: "5"
      VELOCITY_WINDOW: "60"
      SECRET_KEY: "cycle-safe-referral-secret-key-2024"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: referral_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: referral_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pg_data:
